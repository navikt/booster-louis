<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Happy person walking with baby stroller -->
  <!-- Person head -->
  <circle cx="110" cy="72" r="24" fill="#8B9DC3" />
  <!-- Happy face -->
  <circle cx="103" cy="68" r="2.5" fill="#2C3E50" />
  <circle cx="117" cy="68" r="2.5" fill="#2C3E50" />
  <path d="M102 80 Q110 88 118 80" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <!-- Body -->
  <rect x="93" y="96" width="34" height="55" rx="8" fill="#6C7A9C" />
  <!-- Back leg (mid-stride) -->
  <rect x="96" y="151" width="13" height="42" rx="5" fill="#5A6478" transform="rotate(12 102 151)" />
  <!-- Front leg (mid-stride) -->
  <rect x="111" y="151" width="13" height="42" rx="5" fill="#5A6478" transform="rotate(-10 117 151)" />
  <!-- Arm reaching to stroller handle -->
  <path d="M127 110 Q145 115 158 108" stroke="#8B9DC3" stroke-width="11" stroke-linecap="round" fill="none" />
  <!-- Other arm swinging -->
  <path d="M93 112 Q78 130 82 140" stroke="#8B9DC3" stroke-width="11" stroke-linecap="round" fill="none" />
  <!-- Stroller handle -->
  <line x1="168" y1="95" x2="168" y2="140" stroke="#5A6478" stroke-width="5" stroke-linecap="round" />
  <line x1="155" y1="95" x2="181" y2="95" stroke="#5A6478" stroke-width="5" stroke-linecap="round" />
  <!-- Stroller body -->
  <path d="M158 140 L158 175 Q158 185 168 185 L205 185 Q215 185 215 175 L215 130 Z" fill="#6C7A9C" opacity="0.85" />
  <!-- Stroller hood -->
  <path d="M195 115 Q220 115 218 145 L215 130 L195 130 Z" fill="#5A6478" opacity="0.7" />
  <!-- Baby peeking out -->
  <circle cx="190" cy="150" r="12" fill="#C4B5A0" />
  <circle cx="186" cy="148" r="1.8" fill="#2C3E50" />
  <circle cx="194" cy="148" r="1.8" fill="#2C3E50" />
  <path d="M186 155 Q190 158 194 155" stroke="#2C3E50" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <!-- Stroller wheels -->
  <circle cx="165" cy="192" r="9" fill="#3B3F4A" />
  <circle cx="165" cy="192" r="4" fill="#6C7A9C" />
  <circle cx="210" cy="192" r="9" fill="#3B3F4A" />
  <circle cx="210" cy="192" r="4" fill="#6C7A9C" />
  <!-- Ground line -->
  <line x1="40" y1="201" x2="260" y2="201" stroke="#5A6478" stroke-width="2" opacity="0.4" />
  <!-- Sun -->
  <circle cx="255" cy="45" r="18" fill="#F4D35E" opacity="0.7" />
  <g stroke="#F4D35E" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <line x1="255" y1="20" x2="255" y2="12" />
    <line x1="273" y1="27" x2="279" y2="21" />
    <line x1="280" y1="45" x2="288" y2="45" />
    <line x1="237" y1="27" x2="231" y2="21" />
    <line x1="230" y1="45" x2="222" y2="45" />
  </g>
</svg>
