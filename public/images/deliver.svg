<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Person delivering / shipping - "you can deliver" -->
  <!-- Person -->
  <circle cx="100" cy="78" r="24" fill="#8B9DC3" />
  <!-- Confident smile -->
  <circle cx="93" cy="74" r="2.5" fill="#2C3E50" />
  <circle cx="107" cy="74" r="2.5" fill="#2C3E50" />
  <path d="M92 86 Q100 93 108 86" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <!-- Body -->
  <rect x="83" y="102" width="34" height="55" rx="8" fill="#6C7A9C" />
  <!-- Legs striding -->
  <rect x="86" y="157" width="13" height="42" rx="5" fill="#5A6478" transform="rotate(-8 92 157)" />
  <rect x="101" y="157" width="13" height="42" rx="5" fill="#5A6478" transform="rotate(10 107 157)" />
  <!-- Arm lifting rocket/package -->
  <path d="M117 112 Q140 100 152 85" stroke="#8B9DC3" stroke-width="11" stroke-linecap="round" fill="none" />
  <!-- Other arm -->
  <path d="M83 118 Q68 132 65 142" stroke="#8B9DC3" stroke-width="11" stroke-linecap="round" fill="none" />

  <!-- Rocket (delivering/launching) -->
  <g transform="translate(155, 20)">
    <!-- Rocket body -->
    <rect x="0" y="20" width="24" height="50" rx="12" fill="#E8E8E8" />
    <!-- Rocket nose -->
    <path d="M0 20 Q12 -5 24 20" fill="#E74C3C" />
    <!-- Window -->
    <circle cx="12" cy="35" r="6" fill="#3B82F6" />
    <circle cx="12" cy="35" r="3" fill="#5BA8F7" />
    <!-- Fins -->
    <path d="M0 55 L-8 70 L0 65 Z" fill="#E74C3C" opacity="0.8" />
    <path d="M24 55 L32 70 L24 65 Z" fill="#E74C3C" opacity="0.8" />
    <!-- Flame -->
    <path d="M4 70 Q12 95 20 70 Q16 82 12 90 Q8 82 4 70Z" fill="#F39C12" opacity="0.9" />
    <path d="M8 70 Q12 85 16 70 Q14 78 12 82 Q10 78 8 70Z" fill="#F4D35E" />
  </g>

  <!-- Checkmark / success -->
  <g transform="translate(210, 100)">
    <circle cx="30" cy="30" r="28" fill="#27AE60" opacity="0.2" />
    <circle cx="30" cy="30" r="20" fill="#27AE60" opacity="0.3" />
    <path d="M18 30 L26 38 L42 22" stroke="#27AE60" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Speed lines -->
  <g stroke="#8B9DC3" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <line x1="130" y1="55" x2="115" y2="60" />
    <line x1="128" y1="45" x2="110" y2="45" />
    <line x1="132" y1="65" x2="118" y2="72" />
  </g>

  <!-- Ground -->
  <line x1="40" y1="202" x2="260" y2="202" stroke="#5A6478" stroke-width="2" opacity="0.4" />
</svg>
