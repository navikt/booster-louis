<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320">
  <!-- Calendar with few meetings -->
  <!-- Calendar frame -->
  <rect x="30" y="40" width="320" height="260" rx="12" fill="#1E2330" stroke="#3B4560" stroke-width="2" />
  <!-- Calendar header -->
  <rect x="30" y="40" width="320" height="45" rx="12" fill="#2A3348" />
  <rect x="30" y="73" width="320" height="12" fill="#2A3348" />
  <!-- Month title -->
  <text x="190" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B9DC3">March 2026</text>
  <!-- Day headers -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#5A6A85" text-anchor="middle">
    <text x="72" y="100">Mon</text>
    <text x="118" y="100">Tue</text>
    <text x="164" y="100">Wed</text>
    <text x="210" y="100">Thu</text>
    <text x="256" y="100">Fri</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#2A3348" stroke-width="1">
    <line x1="49" y1="108" x2="331" y2="108" />
    <line x1="49" y1="148" x2="331" y2="148" />
    <line x1="49" y1="188" x2="331" y2="188" />
    <line x1="49" y1="228" x2="331" y2="228" />
    <line x1="49" y1="268" x2="331" y2="268" />
    <line x1="95" y1="90" x2="95" y2="290" />
    <line x1="141" y1="90" x2="141" y2="290" />
    <line x1="187" y1="90" x2="187" y2="290" />
    <line x1="233" y1="90" x2="233" y2="290" />
    <line x1="279" y1="90" x2="279" y2="290" />
  </g>
  <!-- A few meeting blocks (sparse calendar) -->
  <rect x="100" y="112" width="38" height="14" rx="3" fill="#3B82F6" opacity="0.8" />
  <rect x="192" y="152" width="38" height="14" rx="3" fill="#3B82F6" opacity="0.8" />
  <rect x="54" y="232" width="38" height="14" rx="3" fill="#3B82F6" opacity="0.8" />
  <!-- Lots of empty space to emphasize "few meetings" -->

  <!-- Zoom logo area -->
  <g transform="translate(380, 100)">
    <!-- Zoom icon rounded rectangle -->
    <rect x="0" y="0" width="90" height="60" rx="14" fill="#2D8CFF" />
    <!-- Camera icon -->
    <rect x="15" y="15" width="35" height="30" rx="5" fill="white" />
    <polygon points="55,20 75,12 75,48 55,40" fill="white" />
  </g>
  <!-- "Zoom" text -->
  <text x="425" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D8CFF">Zoom</text>
</svg>
